- name: demo on data types
  hosts: local
  connection: local
  vars: 
    PROGRAM: "DevSecOps with AWS" # string
    DURATION: 140 # int/number
    IS_LIVE: true # bool
    DETAILS: # map/dictionary
      MONTHS: 4
      TRAINER: "Shiva"
    Topics: # list , starts with - (or) []
    - Linux
    - Shell
    - Ansible
  tasks:
  - name: print variables
    ansible.builtin.debug:
      msg: |
        Program: {{ PROGRAM }}
        Duration: {{ DURATION }}
        Is Live?: {{ IS_LIVE }}
        Details: {{ DETAILS }}
        Topics: {{ TOPICS }}